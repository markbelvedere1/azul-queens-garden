<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Azul: Queen's Garden</title>
<style>
:root {
  --bg: #F5F0E8;
  --surface: #FFFFFF;
  --borders: #D4C9B8;
  --text: #2C2416;
  --text-muted: #7A6E5D;
  --accent: #1B6B4A;
  --danger: #C0392B;
  --success: #27AE60;
  --warning: #E67E22;
  --lavender: #B39DDB;
  --purple: #7B1FA2;
  --light-green: #81C784;
  --dark-green: #2E7D32;
  --light-blue: #64B5F6;
  --yellow: #FFD54F;
  --joker: #9E9E9E;
  --hex-size: 28;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  background: var(--accent);
  color: white;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 1.15rem; font-weight: 600; }
.phase-tag {
  font-size: 0.7rem;
  background: rgba(255,255,255,0.2);
  padding: 2px 8px;
  border-radius: 4px;
}
main {
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: auto 1fr;
  gap: 12px;
  padding: 12px;
  max-width: 1400px;
  margin: 0 auto;
}
/* Display Area (top spanning full width) */
.display-area {
  grid-column: 1 / -1;
  background: var(--surface);
  border: 1px solid var(--borders);
  border-radius: 8px;
  padding: 12px;
}
.display-area h2 { font-size: 0.9rem; margin-bottom: 8px; color: var(--accent); }
.display-row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  align-items: flex-start;
}
/* Expansion stack item */
.exp-stack-item {
  flex-shrink: 0;
  width: 180px;
  border: 1.5px solid var(--borders);
  border-radius: 8px;
  padding: 8px;
  background: #fafaf5;
  position: relative;
}
.exp-stack-item.face-up { border-color: var(--accent); background: #f0f9f4; }
.exp-stack-item .exp-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.exp-stack-item .exp-combo {
  font-size: 0.7rem;
  color: var(--accent);
  margin-bottom: 4px;
}
.exp-tiles {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.exp-tile-pip {
  width: 28px;
  height: 28px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.15);
}
/* Acquire declaration */
.acquire-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--borders);
}
.acquire-bar label { font-size: 0.8rem; font-weight: 600; }
.acquire-bar select {
  padding: 4px 8px;
  border: 1px solid var(--borders);
  border-radius: 4px;
  font-size: 0.8rem;
}
.acquire-bar button {
  padding: 6px 14px;
  border: 1px solid var(--accent);
  border-radius: 6px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-size: 0.8rem;
}
.acquire-bar button:hover { background: #15573c; }
.acquire-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
/* Garden */
.garden-area {
  background: var(--surface);
  border: 1px solid var(--borders);
  border-radius: 8px;
  padding: 12px;
  min-height: 400px;
  overflow: auto;
}
.garden-area h2 { font-size: 0.9rem; margin-bottom: 8px; color: var(--accent); }
.garden-svg { display: block; margin: 0 auto; }
.hex-cell { stroke: var(--borders); stroke-width: 1; fill: var(--surface); cursor: pointer; transition: fill 0.15s; }
.hex-cell:hover { fill: #f0ebe3; }
.hex-cell.occupied { cursor: default; }
.hex-cell.valid-target { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 4 2; fill: #e8f5e9; }
.hex-cell.fountain { fill: #e3f2fd; stroke: var(--light-blue); }
.hex-pattern { pointer-events: none; font-size: 11px; fill: white; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 12px; }
.panel { background: var(--surface); border: 1px solid var(--borders); border-radius: 8px; padding: 10px; }
.panel h3 { font-size: 0.8rem; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
/* Scores */
.scores { display: flex; flex-direction: column; gap: 3px; }
.score-row { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 4px; font-size: 0.8rem; }
.score-row.active { background: #e8f5e9; font-weight: 600; }
.score-dot { width: 9px; height: 9px; border-radius: 50%; }
.score-name { flex: 1; }
.score-val { font-weight: 700; font-variant-numeric: tabular-nums; }
/* Storage */
.storage-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; }
.storage-slot {
  aspect-ratio: 1; border: 1.5px dashed var(--borders); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; min-height: 32px;
}
.storage-slot:hover { border-color: var(--accent); }
.storage-slot.has-tile { border-style: solid; cursor: grab; }
.storage-slot.selected { border-color: var(--accent); border-width: 2px; box-shadow: 0 0 0 2px rgba(27,107,74,0.3); }
.tile-pip {
  width: 80%; height: 80%; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: bold; color: white;
}
.expansion-slots { display: flex; gap: 6px; margin-top: 6px; }
.expansion-slot {
  flex: 1; height: 40px; border: 1.5px dashed var(--borders); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; color: var(--text-muted);
}
.expansion-slot.has-exp { border-style: solid; border-color: var(--accent); background: #f0f9f4; font-weight: 600; font-size: 0.7rem; color: var(--accent); }
/* Actions */
.actions { display: flex; gap: 6px; flex-wrap: wrap; }
.actions button {
  padding: 6px 12px; border: 1px solid var(--borders); border-radius: 5px;
  background: var(--surface); color: var(--text); cursor: pointer;
  font-size: 0.75rem; transition: all 0.15s;
}
.actions button:hover { border-color: var(--accent); color: var(--accent); }
.actions button.primary { background: var(--accent); color: white; border-color: var(--accent); }
.actions button.primary:hover { background: #15573c; }
.actions button:disabled { opacity: 0.4; cursor: not-allowed; }
/* Info bar */
.info-bar {
  padding: 6px 10px; background: #fffde7; border: 1px solid #fff9c4;
  border-radius: 5px; font-size: 0.75rem; color: var(--text); margin-bottom: 6px;
}
/* Log */
.log-entries { max-height: 100px; overflow-y: auto; font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }
.log-entry { padding: 1px 0; border-bottom: 1px solid #f0ebe3; }
/* Tile ref */
.tile-ref { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; font-size: 0.65rem; }
.tile-ref-item { display: flex; align-items: center; gap: 3px; }
.tile-ref-swatch { width: 10px; height: 10px; border-radius: 2px; }
/* Turn indicator */
.turn-indicator {
  text-align: center; font-size: 0.85rem; font-weight: 600;
  padding: 6px; background: #e8f5e9; border-radius: 6px; margin-bottom: 6px;
}
.turn-indicator.waiting { background: #fff3e0; }
/* Bag counter */
.bag-counter { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>🌺 Azul: Queen's Garden</h1>
  <span class="phase-tag">Phase 2 — Drafting System</span>
</header>
<main>
  <!-- Display Area -->
  <div class="display-area" id="displayArea">
    <h2>Display Area — Round <span id="displayRound">1</span>/4</h2>
    <div class="display-row" id="displayRow"></div>
    <div class="acquire-bar" id="acquireBar">
      <label>Acquire:</label>
      <select id="acquireType">
        <option value="color">Color</option>
        <option value="pattern">Pattern</option>
      </select>
      <select id="acquireValue"></select>
      <button id="btnAcquire">Take Matching</button>
      <span id="acquirePreview" style="font-size:0.75rem;color:var(--text-muted)"></span>
    </div>
  </div>
  <!-- Garden -->
  <div class="garden-area" id="gardenArea">
    <h2>Your Garden</h2>
    <div id="gardenContainer"></div>
  </div>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel">
      <div class="turn-indicator" id="turnIndicator">Your Turn</div>
      <h3>Scores — Round <span id="roundNum">1</span>/4</h3>
      <div class="scores" id="scoreBoard"></div>
    </div>
    <div class="panel">
      <h3>Storage (<span id="storageCount">0</span>/12 tiles, <span id="expCount">0</span>/2 exp)</h3>
      <div class="storage-grid" id="storageGrid"></div>
      <div class="expansion-slots" id="expansionSlots">
        <div class="expansion-slot" id="expSlot0">Empty</div>
        <div class="expansion-slot" id="expSlot1">Empty</div>
      </div>
      <div class="bag-counter" id="bagCounter"></div>
    </div>
    <div class="panel">
      <h3>Actions</h3>
      <div id="infoBar" class="info-bar">Choose an action: Acquire tiles, Place a tile, or Pass.</div>
      <div class="actions" style="margin-top:6px">
        <button id="btnPlace" disabled>Place Tile</button>
        <button id="btnPlaceExp" disabled>Place Expansion</button>
        <button id="btnPass">Pass</button>
        <button id="btnNewGame">New Game</button>
      </div>
    </div>
    <div class="panel">
      <h3>Game Log</h3>
      <div class="log-entries" id="gameLog"></div>
    </div>
    <div class="panel">
      <h3>Reference</h3>
      <div class="tile-ref" id="tileRef"></div>
    </div>
  </div>
</main>
<script>
/* ============================================================
   AZUL: QUEEN'S GARDEN — Phase 1+2: Hex grid, data model,
   adjacency, drafting system
   ============================================================ */

// === CONSTANTS ===
const COLORS = [
  { name: 'Lavender', hex: '#B39DDB', id: 'lavender' },
  { name: 'Purple',   hex: '#7B1FA2', id: 'purple' },
  { name: 'L.Green',  hex: '#81C784', id: 'light-green' },
  { name: 'D.Green',  hex: '#2E7D32', id: 'dark-green' },
  { name: 'L.Blue',   hex: '#64B5F6', id: 'light-blue' },
  { name: 'Yellow',   hex: '#FFD54F', id: 'yellow' }
];

const PATTERNS = [
  { name: 'Tree',      cost: 1, icon: '🌲', id: 'tree' },
  { name: 'Bird',      cost: 2, icon: '🐦', id: 'bird' },
  { name: 'Butterfly', cost: 3, icon: '🦋', id: 'butterfly' },
  { name: 'Flower',    cost: 4, icon: '🌸', id: 'flower' },
  { name: 'Grass',     cost: 5, icon: '🌿', id: 'grass' },
  { name: 'Tulip',     cost: 6, icon: '🌷', id: 'tulip' }
];

const COLOR_MAP = {};
COLORS.forEach(function(c) { COLOR_MAP[c.id] = c; });
const PATTERN_MAP = {};
PATTERNS.forEach(function(p) { PATTERN_MAP[p.id] = p; });

const HEX_SIZE = 28;
const SQRT3 = Math.sqrt(3);
const EXPANSIONS_PER_ROUND = 9; // for 4 players
const TILES_PER_EXPANSION = 4;

// === TILE FACTORY ===
function createAllTiles() {
  var tiles = [];
  var id = 0;
  for (var ci = 0; ci < COLORS.length; ci++) {
    var color = COLORS[ci];
    for (var pi = 0; pi < PATTERNS.length; pi++) {
      var pattern = PATTERNS[pi];
      for (var copy = 0; copy < 3; copy++) {
        tiles.push({
          id: id++,
          color: color.id,
          colorName: color.name,
          colorHex: color.hex,
          pattern: pattern.id,
          patternName: pattern.name,
          patternIcon: pattern.icon,
          cost: pattern.cost,
          isJoker: false
        });
      }
    }
  }
  return tiles;
}

function createJokers() {
  var jokers = [];
  for (var i = 0; i < 24; i++) {
    jokers.push({
      id: 1000 + i,
      color: 'joker',
      colorName: 'Joker',
      colorHex: '#9E9E9E',
      pattern: 'joker',
      patternName: 'Joker',
      patternIcon: '★',
      cost: 0,
      isJoker: true
    });
  }
  return jokers;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// === EXPANSION FACTORY ===
// Each expansion: 7-hex piece with a pavilion center and one hex having a specific color+pattern combo
function createExpansions() {
  var expansions = [];
  var id = 0;
  // Generate 36 unique expansions (one per color/pattern combo), shuffle & use 9 per round
  for (var ci = 0; ci < COLORS.length; ci++) {
    for (var pi = 0; pi < PATTERNS.length; pi++) {
      expansions.push({
        id: id++,
        color: COLORS[ci].id,
        colorName: COLORS[ci].name,
        colorHex: COLORS[ci].hex,
        pattern: PATTERNS[pi].id,
        patternName: PATTERNS[pi].name,
        patternIcon: PATTERNS[pi].icon,
        faceUp: false,
        tilesOnTop: [] // tiles drawn onto this expansion in the stack
      });
    }
  }
  return shuffle(expansions);
}

// === HEX GRID MATH ===
function hexToPixel(q, r, size) {
  return {
    x: size * (SQRT3 * q + SQRT3 / 2 * r),
    y: size * (3 / 2 * r)
  };
}

function hexPoints(cx, cy, size) {
  var pts = [];
  for (var i = 0; i < 6; i++) {
    var angle = Math.PI / 180 * (60 * i - 30);
    pts.push((cx + size * Math.cos(angle)) + ',' + (cy + size * Math.sin(angle)));
  }
  return pts.join(' ');
}

var HEX_DIRS = [
  {q:1,r:0},{q:1,r:-1},{q:0,r:-1},{q:-1,r:0},{q:-1,r:1},{q:0,r:1}
];

function hexNeighbors(q, r) {
  return HEX_DIRS.map(function(d) { return { q: q + d.q, r: r + d.r }; });
}

function hexKey(q, r) { return q + ',' + r; }

// === FOUNTAIN BOARD ===
function createFountainLayout() {
  var cells = [];
  cells.push({ q: 0, r: 0, feature: 'fountain' });
  for (var i = 0; i < HEX_DIRS.length; i++) {
    cells.push({ q: HEX_DIRS[i].q, r: HEX_DIRS[i].r, feature: null });
  }
  var ring2 = [{q:2,r:-1},{q:1,r:1},{q:-1,r:2},{q:-2,r:1},{q:-1,r:-1},{q:1,r:-2}];
  for (var j = 0; j < ring2.length; j++) {
    cells.push({ q: ring2[j].q, r: ring2[j].r, feature: null });
  }
  return cells;
}

// === GAME STATE ===
var State = {
  players: [],
  currentPlayer: 0,
  round: 1,
  bag: [],
  jokerPool: [],
  allExpansions: [],
  // Display area
  expansionStack: [],    // face-down expansions with tiles on top
  displayExpansions: [],  // face-up expansions in the display
  // Per-player
  selectedStorageTile: null,
  selectedHex: null,
  garden: new Map(),
  gardenCells: [],
  storage: [],           // max 12 tiles
  expansionStorage: [],  // max 2 expansions
  log: [],
  phase: 'acquire', // acquire | place | pass | roundEnd
  roundPassed: []  // players who have passed this round
};

function initGame() {
  State.bag = shuffle(createAllTiles());
  State.jokerPool = createJokers();
  State.allExpansions = createExpansions();
  State.round = 1;
  State.currentPlayer = 0;
  State.selectedStorageTile = null;
  State.selectedHex = null;
  State.log = [];
  State.phase = 'acquire';
  State.roundPassed = [false, false, false, false];

  State.players = [
    { name: 'You',        score: 15, color: '#2C2416', isHuman: true },
    { name: 'AI-Greedy',  score: 15, color: '#C62828', isHuman: false },
    { name: 'AI-Builder', score: 15, color: '#1565C0', isHuman: false },
    { name: 'AI-Balance', score: 15, color: '#6A1B9A', isHuman: false }
  ];

  // Init fountain garden
  State.gardenCells = createFountainLayout();
  State.garden = new Map();
  for (var i = 0; i < State.gardenCells.length; i++) {
    var cell = State.gardenCells[i];
    State.garden.set(hexKey(cell.q, cell.r), {
      q: cell.q, r: cell.r, tile: null, feature: cell.feature
    });
  }

  // Start with 3 jokers
  State.storage = [];
  for (var j = 0; j < 3; j++) {
    if (State.jokerPool.length) State.storage.push(State.jokerPool.shift());
  }
  State.expansionStorage = [];

  // Set up display for round 1
  setupRoundDisplay();

  addLog('Game started! Round 1 of 4.');
  addLog('Use Acquire to take tiles from the display.');
  renderAll();
}

// === ROUND DISPLAY SETUP ===
function setupRoundDisplay() {
  State.expansionStack = [];
  State.displayExpansions = [];

  // Take EXPANSIONS_PER_ROUND expansions for this round
  var roundExps = State.allExpansions.splice(0, EXPANSIONS_PER_ROUND);

  // All start face-down in the stack with tiles on top
  for (var i = 0; i < roundExps.length; i++) {
    var exp = roundExps[i];
    exp.faceUp = false;
    exp.tilesOnTop = [];
    // Draw TILES_PER_EXPANSION tiles from bag onto this expansion
    for (var t = 0; t < TILES_PER_EXPANSION; t++) {
      if (State.bag.length) {
        exp.tilesOnTop.push(State.bag.pop());
      }
    }
    State.expansionStack.push(exp);
  }

  addLog('Round ' + State.round + ': ' + roundExps.length + ' expansions placed, ' +
    State.bag.length + ' tiles remain in bag.');
}

// === ACQUIRE ACTION ===
function getAcquireMatches(type, value) {
  var matchedTiles = [];
  var matchedExpansions = [];

  // Check tiles on top of stacked expansions
  for (var i = 0; i < State.expansionStack.length; i++) {
    var exp = State.expansionStack[i];
    for (var t = 0; t < exp.tilesOnTop.length; t++) {
      var tile = exp.tilesOnTop[t];
      if (type === 'color' && tile.color === value) matchedTiles.push({ source: 'stack', expIdx: i, tileIdx: t, tile: tile });
      if (type === 'pattern' && tile.pattern === value) matchedTiles.push({ source: 'stack', expIdx: i, tileIdx: t, tile: tile });
    }
  }

  // Check face-up expansions in display
  for (var j = 0; j < State.displayExpansions.length; j++) {
    var dExp = State.displayExpansions[j];
    if (type === 'color' && dExp.color === value) matchedExpansions.push({ source: 'display', expIdx: j, exp: dExp });
    if (type === 'pattern' && dExp.pattern === value) matchedExpansions.push({ source: 'display', expIdx: j, exp: dExp });
  }

  return { tiles: matchedTiles, expansions: matchedExpansions };
}

function executeAcquire(type, value) {
  var matches = getAcquireMatches(type, value);

  if (matches.tiles.length === 0 && matches.expansions.length === 0) {
    addLog('No matching tiles or expansions found!');
    return false;
  }

  // Check storage capacity
  var tileSpace = 12 - State.storage.length;
  var expSpace = 2 - State.expansionStorage.length;

  if (matches.tiles.length > tileSpace) {
    addLog('Not enough storage space! Need ' + matches.tiles.length + ' slots, have ' + tileSpace + '.');
    return false;
  }

  if (matches.expansions.length > expSpace) {
    addLog('Not enough expansion storage! Need ' + matches.expansions.length + ' slots, have ' + expSpace + '.');
    return false;
  }

  // Collect tiles (work backwards to avoid index shifting)
  var tilesCollected = 0;
  // Group by expansion index, process each
  var expIndicesAffected = new Set();
  // Sort matches by expIdx descending, tileIdx descending for safe removal
  matches.tiles.sort(function(a, b) {
    if (a.expIdx !== b.expIdx) return b.expIdx - a.expIdx;
    return b.tileIdx - a.tileIdx;
  });

  for (var i = 0; i < matches.tiles.length; i++) {
    var m = matches.tiles[i];
    State.storage.push(m.tile);
    State.expansionStack[m.expIdx].tilesOnTop.splice(m.tileIdx, 1);
    expIndicesAffected.add(m.expIdx);
    tilesCollected++;
  }

  // Process affected expansions: if tiles removed and now empty → flip face-up to display
  // Process from highest index first
  var affectedArr = Array.from(expIndicesAffected).sort(function(a, b) { return b - a; });
  for (var j = 0; j < affectedArr.length; j++) {
    var idx = affectedArr[j];
    var exp = State.expansionStack[idx];
    if (exp.tilesOnTop.length === 0) {
      // Expansion is now empty → flip face-up and move to display
      exp.faceUp = true;
      State.displayExpansions.push(exp);
      State.expansionStack.splice(idx, 1);
      addLog('Expansion flipped face-up: ' + exp.colorName + ' ' + exp.patternName);

      // If there's a next expansion on the stack, draw new tiles onto it
      // (In the real game, the "next" expansion gets revealed and loaded)
      // Actually each expansion already has its own tiles. The stack just shows the top one.
      // When tiles are removed from the TOP expansion on stack: that expansion moves to display,
      // the next one is revealed, 4 new tiles drawn onto it.
      // But for simplicity in our model each expansion has its own tiles pre-loaded.
      // No need to re-draw tiles since they're pre-loaded.
    }
  }

  // Collect matching face-up expansions
  var expsCollected = 0;
  // Sort by index descending
  matches.expansions.sort(function(a, b) { return b.expIdx - a.expIdx; });
  for (var k = 0; k < matches.expansions.length; k++) {
    var em = matches.expansions[k];
    // Find current index (may have shifted if we added new ones above)
    var currentIdx = State.displayExpansions.indexOf(em.exp);
    if (currentIdx >= 0) {
      State.expansionStorage.push(em.exp);
      State.displayExpansions.splice(currentIdx, 1);
      expsCollected++;
    }
  }

  var typeName = type === 'color' ? COLOR_MAP[value].name : PATTERN_MAP[value].name;
  addLog('Acquired ' + tilesCollected + ' tile(s) + ' + expsCollected + ' expansion(s) matching ' + typeName + '.');
  return true;
}

// === ADJACENCY VALIDATION (from Phase 1) ===
function canPlaceTile(q, r, tile) {
  var cell = State.garden.get(hexKey(q, r));
  if (!cell) return false;
  if (cell.tile) return false;

  var neighbors = hexNeighbors(q, r);
  var hasAdjacentTile = false;

  for (var i = 0; i < neighbors.length; i++) {
    var n = neighbors[i];
    var nCell = State.garden.get(hexKey(n.q, n.r));
    if (!nCell || !nCell.tile) continue;
    hasAdjacentTile = true;
    var nt = nCell.tile;

    if (nt.color === tile.color && nt.pattern === tile.pattern) return false;
    if (tile.isJoker || nt.isJoker) continue;
    if (nt.color !== tile.color && nt.pattern !== tile.pattern) return false;
  }

  var gardenHasTiles = false;
  State.garden.forEach(function(c) { if (c.tile) gardenHasTiles = true; });
  if (gardenHasTiles && !hasAdjacentTile) return false;

  return true;
}

function getValidPlacements(tile) {
  var valid = [];
  State.garden.forEach(function(cell, key) {
    if (canPlaceTile(cell.q, cell.r, tile)) {
      valid.push({ q: cell.q, r: cell.r, key: key });
    }
  });
  return valid;
}

// === COST PAYMENT SYSTEM (Phase 3) ===
// Cost = pattern value. Tree=1 (free, tile itself counts), Bird=2 (need 1 extra), etc.
// Payment tiles must share a single color OR single pattern (no mixing), no duplicates, jokers wild.

function getPaymentCost(tile) {
  if (tile.isJoker) return 0; // jokers are free to place
  return tile.cost; // cost equals pattern value
}

function canAffordPlacement(tileIndex) {
  var tile = State.storage[tileIndex];
  if (!tile) return false;
  var cost = getPaymentCost(tile);
  if (cost <= 1) return true; // free placement (tile counts as 1)

  // Need (cost - 1) additional payment tiles from storage
  var needed = cost - 1;
  var available = 0;

  // Count tiles that could pay: share color OR pattern with placed tile, excluding the tile itself
  for (var i = 0; i < State.storage.length; i++) {
    if (i === tileIndex) continue;
    var pt = State.storage[i];
    if (pt.isJoker) { available++; continue; }
    if (pt.color === tile.color || pt.pattern === tile.pattern) available++;
  }
  return available >= needed;
}

// Find valid payment combinations for a tile
function getPaymentOptions(tileIndex) {
  var tile = State.storage[tileIndex];
  if (!tile) return [];
  var cost = getPaymentCost(tile);
  if (cost <= 1) return [[]]; // no payment needed

  var needed = cost - 1;
  // Get all potential payment tiles (share color or pattern, or joker)
  var candidates = [];
  for (var i = 0; i < State.storage.length; i++) {
    if (i === tileIndex) continue;
    var pt = State.storage[i];
    if (pt.isJoker || pt.color === tile.color || pt.pattern === tile.pattern) {
      candidates.push({ idx: i, tile: pt });
    }
  }

  if (candidates.length < needed) return [];

  // For simplicity: auto-select payment. Prefer tiles that share a single attribute.
  // Strategy: prefer jokers last, prefer tiles sharing the less-useful attribute
  // Sort: non-joker tiles sharing color first, then pattern, then jokers
  candidates.sort(function(a, b) {
    if (a.tile.isJoker !== b.tile.isJoker) return a.tile.isJoker ? 1 : -1;
    return 0;
  });

  // Validate: all payment tiles must share ONE attribute (all same color, OR all same pattern)
  // Jokers can stand in for either
  // Try color-based payment first
  var colorPay = tryPaymentByAttribute(candidates, tile, 'color', needed);
  if (colorPay) return [colorPay];
  var patternPay = tryPaymentByAttribute(candidates, tile, 'pattern', needed);
  if (patternPay) return [patternPay];
  // Try with jokers filling in
  var mixedPay = tryMixedPayment(candidates, needed);
  if (mixedPay) return [mixedPay];

  return [];
}

function tryPaymentByAttribute(candidates, placedTile, attr, needed) {
  // Find candidates sharing the specified attribute with placed tile (or jokers)
  var matching = [];
  var usedColors = new Set();
  var usedPatterns = new Set();

  for (var i = 0; i < candidates.length; i++) {
    var c = candidates[i];
    if (c.tile.isJoker) {
      matching.push(c);
    } else if (c.tile[attr] === placedTile[attr]) {
      // Also ensure no duplicate tiles in payment
      var key = c.tile.color + ':' + c.tile.pattern;
      matching.push(c);
    }
  }

  if (matching.length < needed) return null;

  // Select first `needed` non-duplicate tiles
  var selected = [];
  var usedKeys = new Set();
  for (var j = 0; j < matching.length && selected.length < needed; j++) {
    var m = matching[j];
    var k = m.tile.isJoker ? ('joker:' + m.idx) : (m.tile.color + ':' + m.tile.pattern);
    if (!usedKeys.has(k) || m.tile.isJoker) {
      usedKeys.add(k);
      selected.push(m.idx);
    }
  }

  return selected.length >= needed ? selected : null;
}

function tryMixedPayment(candidates, needed) {
  // Just use first `needed` candidates (jokers + others)
  if (candidates.length < needed) return null;
  var result = [];
  for (var i = 0; i < needed && i < candidates.length; i++) {
    result.push(candidates[i].idx);
  }
  return result.length >= needed ? result : null;
}

// === PLACE TILE ===
function placeTile(q, r, tileIndex) {
  var tile = State.storage[tileIndex];
  if (!tile) return false;
  if (!canPlaceTile(q, r, tile)) return false;

  var cost = getPaymentCost(tile);
  var paymentIndices = [];

  if (cost > 1) {
    var options = getPaymentOptions(tileIndex);
    if (options.length === 0) {
      addLog('Cannot afford to place this tile! Need ' + (cost - 1) + ' payment tile(s).');
      return false;
    }
    paymentIndices = options[0]; // auto-select first valid payment
  }

  // Place the tile
  var cell = State.garden.get(hexKey(q, r));
  cell.tile = tile;

  // Remove payment tiles + placed tile (sort indices descending to avoid shift issues)
  var toRemove = [tileIndex].concat(paymentIndices);
  toRemove.sort(function(a, b) { return b - a; });
  for (var i = 0; i < toRemove.length; i++) {
    State.storage.splice(toRemove[i], 1);
  }

  var payMsg = cost > 1 ? ' (paid ' + paymentIndices.length + ' tile(s))' : '';
  addLog('Placed ' + tile.patternIcon + ' ' + tile.colorName + ' ' + tile.patternName + ' at (' + q + ',' + r + ')' + payMsg);

  checkFeatureSurrounded(q, r);
  State.selectedStorageTile = null;
  State.selectedHex = null;
  renderAll();
  return true;
}

// === EXPANSION PLACEMENT (Phase 3) ===
function placeExpansion(expIndex) {
  if (expIndex >= State.expansionStorage.length) return false;
  var exp = State.expansionStorage[expIndex];

  // Find valid attachment points - expansion must connect to existing garden
  // For simplicity: add 7 new hexes around the garden edge
  // In real game: expansion is a specific 7-hex shape with pavilion center
  // We'll approximate by finding a cluster of empty spaces adjacent to the garden

  var edgeHexes = findExpansionAttachPoints();
  if (edgeHexes.length === 0) {
    addLog('No valid spots to attach this expansion!');
    return false;
  }

  // Auto-place at best spot (first valid cluster of 7)
  var cluster = edgeHexes.slice(0, 7);

  // Add new hexes to garden
  for (var i = 0; i < cluster.length; i++) {
    var h = cluster[i];
    if (!State.garden.has(hexKey(h.q, h.r))) {
      State.garden.set(hexKey(h.q, h.r), {
        q: h.q, r: h.r, tile: null,
        feature: i === 0 ? 'pavilion' : null // first hex is pavilion center
      });
    }
  }

  State.expansionStorage.splice(expIndex, 1);
  addLog('Placed expansion: ' + exp.patternIcon + ' ' + exp.colorName + ' ' + exp.patternName + ' (+7 hexes)');
  renderAll();
  return true;
}

function findExpansionAttachPoints() {
  // Find hexes adjacent to garden that aren't in the garden yet
  var candidates = new Map();
  State.garden.forEach(function(cell) {
    var nbrs = hexNeighbors(cell.q, cell.r);
    for (var i = 0; i < nbrs.length; i++) {
      var n = nbrs[i];
      var key = hexKey(n.q, n.r);
      if (!State.garden.has(key) && !candidates.has(key)) {
        candidates.set(key, { q: n.q, r: n.r, adjacentCount: 1 });
      } else if (candidates.has(key)) {
        candidates.get(key).adjacentCount++;
      }
    }
  });

  // Sort by adjacency (prefer spots that touch more existing hexes)
  var result = [];
  candidates.forEach(function(v) { result.push(v); });
  result.sort(function(a, b) { return b.adjacentCount - a.adjacentCount; });

  // Now grow a cluster: start from best candidate, add neighbors
  if (result.length === 0) return [];
  var cluster = [result[0]];
  var used = new Set([hexKey(result[0].q, result[0].r)]);

  for (var i = 1; i < result.length && cluster.length < 7; i++) {
    var c = result[i];
    // Check if this candidate is adjacent to any existing cluster member
    var adjToCluster = false;
    for (var j = 0; j < cluster.length; j++) {
      var dx = Math.abs(c.q - cluster[j].q);
      var dy = Math.abs(c.r - cluster[j].r);
      var ds = Math.abs((-c.q - c.r) - (-cluster[j].q - cluster[j].r));
      if ((dx + dy + ds) / 2 <= 1) { adjToCluster = true; break; }
    }
    if (adjToCluster && !used.has(hexKey(c.q, c.r))) {
      cluster.push(c);
      used.add(hexKey(c.q, c.r));
    }
  }

  // If cluster < 7, expand by adding neighbors of cluster members
  if (cluster.length < 7) {
    for (var k = 0; k < cluster.length && cluster.length < 7; k++) {
      var nbs = hexNeighbors(cluster[k].q, cluster[k].r);
      for (var m = 0; m < nbs.length && cluster.length < 7; m++) {
        var nKey = hexKey(nbs[m].q, nbs[m].r);
        if (!State.garden.has(nKey) && !used.has(nKey)) {
          cluster.push({ q: nbs[m].q, r: nbs[m].r });
          used.add(nKey);
        }
      }
    }
  }

  return cluster;
}

function checkFeatureSurrounded(pq, pr) {
  var toCheck = [{ q: pq, r: pr }].concat(hexNeighbors(pq, pr));
  for (var i = 0; i < toCheck.length; i++) {
    var pos = toCheck[i];
    var cell = State.garden.get(hexKey(pos.q, pos.r));
    if (!cell || !cell.feature) continue;

    var nbrs = hexNeighbors(pos.q, pos.r);
    var allFilled = true;
    var validCount = 0;
    for (var j = 0; j < nbrs.length; j++) {
      var nc = State.garden.get(hexKey(nbrs[j].q, nbrs[j].r));
      if (!nc) continue;
      validCount++;
      if (!nc.tile) { allFilled = false; break; }
    }
    if (allFilled && validCount > 0 && State.jokerPool.length > 0 && State.storage.length < 12) {
      State.storage.push(State.jokerPool.shift());
      addLog('🎉 Surrounded ' + cell.feature + '! Gained a Joker.');
    }
  }
}

function renderGarden() {
  var container = document.getElementById('gardenContainer');
  while (container.firstChild) container.removeChild(container.firstChild);

  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  State.garden.forEach(function(cell) {
    var p = hexToPixel(cell.q, cell.r, HEX_SIZE);
    minX = Math.min(minX, p.x - HEX_SIZE);
    maxX = Math.max(maxX, p.x + HEX_SIZE);
    minY = Math.min(minY, p.y - HEX_SIZE);
    maxY = Math.max(maxY, p.y + HEX_SIZE);
  });

  var pad = 10;
  var w = maxX - minX + pad * 2;
  var h = maxY - minY + pad * 2;
  var offX = -minX + pad;
  var offY = -minY + pad;

  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  svg.classList.add('garden-svg');

  State.garden.forEach(function(cell) {
    var p = hexToPixel(cell.q, cell.r, HEX_SIZE);
    var cx = p.x + offX;
    var cy = p.y + offY;
    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', hexPoints(cx, cy, HEX_SIZE - 1));
    poly.classList.add('hex-cell');

    if (cell.tile) {
      poly.classList.add('occupied');
      poly.style.fill = cell.tile.colorHex;
      poly.style.stroke = '#fff';
      poly.style.strokeWidth = '2';
    } else if (cell.feature) {
      poly.classList.add('fountain');
    }

    if (State.selectedStorageTile !== null) {
      var stile = State.storage[State.selectedStorageTile];
      if (stile && !cell.tile && canPlaceTile(cell.q, cell.r, stile)) {
        poly.classList.add('valid-target');
      }
    }

    (function(qq, rr) {
      poly.addEventListener('click', function() { handleHexClick(qq, rr); });
    })(cell.q, cell.r);

    g.appendChild(poly);

    if (cell.tile) {
      var txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', cx);
      txt.setAttribute('y', cy);
      txt.classList.add('hex-pattern');
      txt.textContent = cell.tile.patternIcon;
      g.appendChild(txt);
    }

    if (cell.feature && !cell.tile) {
      var ftxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      ftxt.setAttribute('x', cx);
      ftxt.setAttribute('y', cy);
      ftxt.classList.add('hex-pattern');
      ftxt.style.fill = '#64B5F6';
      ftxt.style.fontSize = '14px';
      ftxt.textContent = cell.feature === 'fountain' ? '⛲' : '🏛️';
      g.appendChild(ftxt);
    }

    svg.appendChild(g);
  });

  container.appendChild(svg);
}

// === EVENT HANDLERS ===
function handleStorageClick(index) {
  if (State.currentPlayer !== 0) return;
  if (State.selectedStorageTile === index) {
    State.selectedStorageTile = null;
  } else {
    State.selectedStorageTile = index;
  }
  renderAll();
}

function handleHexClick(q, r) {
  if (State.currentPlayer !== 0) return;
  if (State.selectedStorageTile === null) return;
  var tile = State.storage[State.selectedStorageTile];
  if (!tile) return;

  if (!canAffordPlacement(State.selectedStorageTile)) {
    addLog('Cannot afford this tile! Need payment tiles sharing color or pattern.');
    return;
  }

  if (canPlaceTile(q, r, tile)) {
    placeTile(q, r, State.selectedStorageTile);
    endTurn();
  }
}

// === TURN MANAGEMENT ===
function endTurn() {
  // Move to next non-passed player
  var next = (State.currentPlayer + 1) % 4;
  var loopGuard = 0;
  while (State.roundPassed[next] && loopGuard < 4) {
    next = (next + 1) % 4;
    loopGuard++;
  }

  if (loopGuard >= 4) {
    // All passed → end round
    endRound();
    return;
  }

  State.currentPlayer = next;
  State.selectedStorageTile = null;
  renderAll();

  // AI turn
  if (!State.players[State.currentPlayer].isHuman) {
    setTimeout(function() { aiTurn(); }, 300);
  }
}

function aiTurn() {
  var p = State.currentPlayer;
  // Simple AI: try to acquire the color/pattern with most tiles, else pass
  var bestType = null, bestValue = null, bestCount = 0;

  for (var ci = 0; ci < COLORS.length; ci++) {
    var m = getAcquireMatches('color', COLORS[ci].id);
    if (m.tiles.length > bestCount) {
      bestCount = m.tiles.length;
      bestType = 'color';
      bestValue = COLORS[ci].id;
    }
  }
  for (var pi = 0; pi < PATTERNS.length; pi++) {
    var m2 = getAcquireMatches('pattern', PATTERNS[pi].id);
    if (m2.tiles.length > bestCount) {
      bestCount = m2.tiles.length;
      bestType = 'pattern';
      bestValue = PATTERNS[pi].id;
    }
  }

  if (bestCount > 0) {
    // Check if AI has storage space (we'll pretend they have separate storage for now)
    addLog(State.players[p].name + ' acquires ' + bestCount + ' tiles (' + bestType + ': ' +
      (bestType === 'color' ? COLOR_MAP[bestValue].name : PATTERN_MAP[bestValue].name) + ')');
    // Remove the tiles from display (same as player acquire but without adding to player storage)
    // For now, AI removes tiles from display but doesn't track their board
    var matches = getAcquireMatches(bestType, bestValue);
    // Remove tiles from stack
    matches.tiles.sort(function(a, b) {
      if (a.expIdx !== b.expIdx) return b.expIdx - a.expIdx;
      return b.tileIdx - a.tileIdx;
    });
    for (var i = 0; i < matches.tiles.length; i++) {
      var mt = matches.tiles[i];
      State.expansionStack[mt.expIdx].tilesOnTop.splice(mt.tileIdx, 1);
    }
    // Check for empty expansions
    var affected = new Set();
    for (var j = 0; j < matches.tiles.length; j++) affected.add(matches.tiles[j].expIdx);
    var affArr = Array.from(affected).sort(function(a, b) { return b - a; });
    for (var k = 0; k < affArr.length; k++) {
      var exp = State.expansionStack[affArr[k]];
      if (exp.tilesOnTop.length === 0) {
        exp.faceUp = true;
        State.displayExpansions.push(exp);
        State.expansionStack.splice(affArr[k], 1);
      }
    }
  } else {
    addLog(State.players[p].name + ' passes.');
    State.roundPassed[p] = true;
  }

  endTurn();
}

function endRound() {
  addLog('--- Round ' + State.round + ' ended ---');
  State.round++;

  if (State.round > 4) {
    addLog('🏁 GAME OVER! Final scoring coming in Phase 4.');
    renderAll();
    return;
  }

  // Reset passes
  State.roundPassed = [false, false, false, false];
  State.currentPlayer = 0; // simplified: first player always starts

  // Discard remaining display items
  State.expansionStack = [];
  State.displayExpansions = [];

  // Setup next round
  setupRoundDisplay();
  addLog('Round ' + State.round + ' begins!');
  renderAll();
}

// === BUTTON HANDLERS ===
document.getElementById('btnNewGame').addEventListener('click', function() {
  initGame();
});

document.getElementById('btnPass').addEventListener('click', function() {
  if (State.currentPlayer !== 0) return;
  addLog('You pass.');
  State.roundPassed[0] = true;
  endTurn();
});

document.getElementById('btnPlaceExp').addEventListener('click', function() {
  if (State.currentPlayer !== 0 || State.roundPassed[0]) return;
  if (State.expansionStorage.length > 0) {
    if (placeExpansion(0)) {
      endTurn();
    }
  }
});

document.getElementById('btnPlace').addEventListener('click', function() {
  // Button is informational; actual placement via hex click
  if (State.selectedStorageTile !== null) {
    var tile = State.storage[State.selectedStorageTile];
    var valid = getValidPlacements(tile);
    if (valid.length === 0) {
      addLog('No valid placements for this tile!');
    }
  }
});

document.getElementById('btnAcquire').addEventListener('click', function() {
  if (State.currentPlayer !== 0 || State.roundPassed[0]) return;
  var type = document.getElementById('acquireType').value;
  var value = document.getElementById('acquireValue').value;
  if (executeAcquire(type, value)) {
    endTurn();
  }
});

document.getElementById('acquireType').addEventListener('change', function() {
  updateAcquireOptions();
});

document.getElementById('acquireValue').addEventListener('change', function() {
  var type = document.getElementById('acquireType').value;
  var value = document.getElementById('acquireValue').value;
  var matches = getAcquireMatches(type, value);
  document.getElementById('acquirePreview').textContent =
    '→ ' + matches.tiles.length + ' tile(s), ' + matches.expansions.length + ' expansion(s)';
});

// === INIT ===
initGame();
</script>
